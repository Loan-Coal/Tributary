<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Turtle Tax — Cross-Border Tax Copilot</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090f;--s1:#0d1117;--s2:#161d2c;--s3:#1c2840;
  --bd:#1e3050;--acc:#3b82f6;--ind:#6366f1;--grn:#10b981;
  --red:#ef4444;--yel:#f59e0b;--org:#f97316;--pur:#a855f7;
  --tx:#e2e8f0;--tx2:#94a3b8;--tx3:#475569;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px}

/* NAV */
.nav{background:var(--s1);border-bottom:1px solid var(--bd);display:flex;align-items:stretch;position:sticky;top:0;z-index:100;overflow-x:auto}
.brand{display:flex;align-items:center;gap:10px;padding:14px 24px 14px 16px;border-right:1px solid var(--bd);flex-shrink:0}
.brand-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--acc),var(--ind));border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;color:#fff;flex-shrink:0}
.brand-n{font-size:16px;font-weight:800}
.brand-s{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em}
.tabs{display:flex}
.tab{display:flex;align-items:center;gap:6px;padding:0 16px;font-size:13px;font-weight:500;color:var(--tx3);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;user-select:none}
.tab:hover{color:var(--tx2)}
.tab.on{color:var(--acc);border-bottom-color:var(--acc)}
.tab .pill{background:var(--s2);border:1px solid var(--bd);border-radius:4px;padding:1px 5px;font-size:10px;font-weight:700}
.tab.on .pill{background:var(--acc);border-color:var(--acc);color:#fff}
.hot{background:var(--red);color:#fff;border-radius:9999px;padding:1px 6px;font-size:10px;font-weight:800}
.nav-right{display:flex;align-items:center;gap:8px;padding:0 16px;margin-left:auto;flex-shrink:0;font-size:12px;color:var(--tx3);border-left:1px solid var(--bd)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--grn);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* LAYOUT */
.page{padding:28px 32px;max-width:1380px;margin:0 auto;display:none}
.page.on{display:block}
.ph{margin-bottom:24px}
.ph h1{font-size:22px;font-weight:800;margin-bottom:6px}
.ph p{color:var(--tx2);line-height:1.65;font-size:13px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.mb{margin-bottom:16px}
.mb2{margin-bottom:26px}
@media(max-width:860px){.g2,.g3{grid-template-columns:1fr}}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:20px}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.ct{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em}

/* BADGES */
.b{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:9999px;font-size:11px;font-weight:700;white-space:nowrap}
.b-blue{background:rgba(59,130,246,.13);color:var(--acc);border:1px solid rgba(59,130,246,.3)}
.b-green{background:rgba(16,185,129,.13);color:var(--grn);border:1px solid rgba(16,185,129,.3)}
.b-red{background:rgba(239,68,68,.13);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.b-yellow{background:rgba(245,158,11,.13);color:var(--yel);border:1px solid rgba(245,158,11,.3)}
.b-purple{background:rgba(168,85,247,.13);color:var(--pur);border:1px solid rgba(168,85,247,.3)}
.b-dim{background:var(--s2);color:var(--tx3);border:1px solid var(--bd)}

/* TABLE */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 12px;color:var(--tx3);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--bd);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid rgba(30,48,80,.5);color:var(--tx2);vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.015)}
.mono{font-family:'Courier New',monospace;font-size:11px}
.bold{font-weight:700;color:var(--tx)}

/* STEP FLOW */
.sf{display:flex;align-items:center;margin-bottom:24px;overflow-x:auto;padding-bottom:4px}
.sf-step{display:flex;align-items:center;gap:6px;padding:7px 12px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;white-space:nowrap;flex-shrink:0}
.sf-step.s-done{border-color:rgba(16,185,129,.4)}
.sf-step.s-todo{opacity:.55}
.sf-conn{width:16px;height:2px;background:var(--bd);flex-shrink:0}
.sf-num{width:19px;height:19px;border-radius:50%;font-size:10px;font-weight:900;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sf-num.done{background:var(--grn)}
.sf-num.wip{background:var(--yel)}
.sf-num.todo{background:var(--s3);color:var(--tx3);border:1px solid var(--bd)}
.sf-label{font-size:12px;font-weight:600;color:var(--tx2)}

/* STATS */
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.stat{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:12px 16px;flex:1;min-width:130px}
.stat-l{font-size:10px;color:var(--tx3);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.stat-v{font-weight:800}
.stat-s{font-size:10px;color:var(--tx3);margin-top:2px}

/* JURISDICTION CARD */
.jcard{border:1px solid var(--bd);border-radius:12px;overflow:hidden;background:var(--s1)}
.jh{padding:14px 18px;display:flex;align-items:center;gap:12px}
.jh.hk{background:linear-gradient(135deg,rgba(59,130,246,.12),rgba(59,130,246,.02));border-bottom:1px solid rgba(59,130,246,.2)}
.jh.de{background:linear-gradient(135deg,rgba(245,158,11,.12),rgba(245,158,11,.02));border-bottom:1px solid rgba(245,158,11,.2)}
.jh.us{background:linear-gradient(135deg,rgba(239,68,68,.12),rgba(239,68,68,.02));border-bottom:1px solid rgba(239,68,68,.2)}
.jflag{font-size:30px}
.jtitle{font-size:14px;font-weight:800}
.jsub{font-size:10px;color:var(--tx3);font-family:monospace;margin-top:2px}
.jbody{padding:14px 18px}
.ob{display:flex;align-items:flex-start;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--bd);cursor:pointer}
.ob:last-child{border-bottom:none}
.ob-name{font-size:13px;font-weight:600;color:var(--tx)}
.ob-rule{font-size:10px;color:var(--tx3);font-family:monospace;margin-top:2px}
.ob-amt{font-size:14px;font-weight:800;font-family:monospace;text-align:right}
.ob-due{font-size:10px;color:var(--tx3);text-align:right;margin-top:2px}
.ob-exp{padding:8px 0 4px;font-size:12px;color:var(--tx3);line-height:1.65;border-bottom:1px solid var(--bd)}

/* MISC */
.cite{background:var(--s2);border-left:3px solid var(--acc);padding:7px 11px;border-radius:0 6px 6px 0;font-size:11px;color:var(--tx3);font-family:monospace;margin-top:6px;line-height:1.55}
.cite strong{color:var(--acc)}
.nr-box{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:7px;padding:7px 11px;font-size:12px;color:var(--yel);margin-top:6px}
.placeholder{background:var(--s2);border:1px dashed var(--bd);border-radius:10px;padding:24px;text-align:center;color:var(--tx3);font-size:13px;line-height:1.6}
.placeholder strong{color:var(--yel);display:block;margin-bottom:4px;font-size:14px}
.todo-chip{display:inline-flex;align-items:center;gap:5px;background:rgba(245,158,11,.08);border:1px dashed rgba(245,158,11,.35);border-radius:6px;padding:3px 9px;font-size:11px;color:var(--yel);font-weight:600}

/* ARCH LAYERS */
.al{display:flex;align-items:center;gap:12px;border:1px solid var(--bd);border-radius:9px;padding:11px 14px;margin-bottom:9px}
.al.done-l{border-color:rgba(16,185,129,.3);background:rgba(16,185,129,.03)}
.al.wip-l{border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.03)}
.al.todo-l{opacity:.6}
.al-icon{font-size:20px;width:30px;text-align:center;flex-shrink:0}
.al-name{font-size:13px;font-weight:700}
.al-desc{font-size:11px;color:var(--tx3);margin-top:2px}
.al-file{font-size:10px;color:var(--tx3);margin-top:2px;font-family:monospace}
.al-badge{margin-left:auto;flex-shrink:0}

/* CONFLICT */
.cbanner{background:linear-gradient(135deg,rgba(239,68,68,.09),rgba(239,68,68,.02));border:1px solid rgba(239,68,68,.3);border-radius:12px;padding:18px 20px;margin-bottom:20px}
.cbanner-title{font-size:16px;font-weight:800;color:var(--red);margin-bottom:8px}
.cbanner-desc{font-size:13px;color:var(--tx2);line-height:1.75}
.tbox{background:linear-gradient(135deg,rgba(16,185,129,.08),rgba(16,185,129,.02));border:1px solid rgba(16,185,129,.25);border-radius:12px;padding:18px 20px}
.pe-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.pe-box{background:rgba(16,185,129,.05);border:1px solid rgba(16,185,129,.15);border-radius:8px;padding:11px 14px;text-align:center}
.pe-box-l{font-size:10px;color:var(--tx3);text-transform:uppercase;font-weight:700;margin-bottom:4px}
.pe-box-v{font-size:16px;font-weight:900;font-family:monospace}
@media(max-width:860px){.pe-grid{grid-template-columns:1fr 1fr}}

/* BRIEF */
.bcard{background:var(--s1);border:1px solid var(--bd);border-radius:12px;overflow:hidden;margin-bottom:20px}
.bh{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd);flex-wrap:wrap;gap:10px}
.bh.hk{background:linear-gradient(135deg,rgba(59,130,246,.08),transparent)}
.bh.de{background:linear-gradient(135deg,rgba(245,158,11,.08),transparent)}
.bh.us{background:linear-gradient(135deg,rgba(239,68,68,.08),transparent)}
.bh-left{display:flex;gap:12px;align-items:center}
.bb{padding:20px}
.bst{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;margin-top:16px}
.bst:first-child{margin-top:0}
.btx{font-size:13px;color:var(--tx2);line-height:1.75}

/* CODE */
.code-block{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:14px 16px;font-family:'Courier New',monospace;font-size:12px;color:#a5b4fc;line-height:1.7;overflow-x:auto;white-space:pre}

/* HERO */
.hero{background:linear-gradient(135deg,rgba(59,130,246,.09),rgba(99,102,241,.05));border:1px solid rgba(59,130,246,.2);border-radius:14px;padding:30px 34px;margin-bottom:26px}
.hero-tag{font-size:12px;color:var(--acc);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.hero-title{font-size:28px;font-weight:900;line-height:1.15;margin-bottom:12px}
.hero-title span{color:var(--acc)}
.hero-sub{font-size:14px;color:var(--tx2);line-height:1.75;max-width:660px;margin-bottom:18px}
.badges{display:flex;gap:8px;flex-wrap:wrap}

/* INFO BOXES */
.info-box{background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.18);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--tx3);line-height:1.6;margin-top:12px}
.info-box strong{color:var(--ind)}
.warn-box{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.18);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--tx3);line-height:1.6;margin-top:12px}
.warn-box strong{color:var(--yel)}

/* YEAR BUTTONS */
.yr-btn{background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700;color:var(--tx3);cursor:pointer}
.yr-btn.on{background:var(--acc);border-color:var(--acc);color:#fff}
</style>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

function usd(n) {
  if (n === null) return "—";
  var abs = Math.abs(n);
  var sign = n < 0 ? "-" : "";
  if (abs >= 1e9) return sign + "USD " + (abs/1e9).toFixed(2) + "B";
  return sign + "USD " + (abs/1e6).toFixed(1) + "M";
}
function hkd(n) { return n === null ? "⏳ todo" : "HKD " + n.toLocaleString(); }

function badge(s) {
  if (s === "done") return '<span class="b b-green">✓ Done</span>';
  if (s === "wip")  return '<span class="b b-yellow">⚡ In progress</span>';
  return '<span class="b b-dim">⬜ Todo</span>';
}
function btype(t) {
  var m = {rate:"b-blue",treaty:"b-purple",exemption:"b-green",loss:"b-green",threshold:"b-yellow"};
  return '<span class="b ' + (m[t] || "b-dim") + '">' + t + '</span>';
}
function jcol(type) {
  return type === "hk" ? "var(--acc)" : type === "de" ? "var(--yel)" : "var(--red)";
}

function stepFlow(steps) {
  var html = '<div class="sf">';
  for (var i = 0; i < steps.length; i++) {
    var s = steps[i];
    var cls = s.s === "done" ? "s-done" : s.s === "todo" ? "s-todo" : "";
    var nc  = s.s === "done" ? "done" : s.s === "wip" ? "wip" : "todo";
    var num = s.s === "done" ? "✓" : (i + 1);
    if (i > 0) html += '<div class="sf-conn"></div>';
    html += '<div class="sf-step ' + cls + '">' +
      '<div class="sf-num ' + nc + '">' + num + '</div>' +
      '<span class="sf-label">' + s.l + '</span>' +
      (s.s === "todo" ? '<span class="todo-chip">todo</span>' : '') +
      '</div>';
  }
  return html + '</div>';
}

function showTab(id) {
  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.toggle('on', tabs[i].dataset.id === id);
  }
  var pages = document.querySelectorAll('.page');
  for (var i = 0; i < pages.length; i++) {
    pages[i].classList.remove('on');
  }
  document.getElementById('pg-' + id).classList.add('on');
  if (!built[id]) {
    built[id] = true;
    if (id === "overview") buildOverview();
    if (id === "data")     { buildData(); loadGraph(); }
    if (id === "engine")   buildEngine();
    if (id === "ai")       buildAI();
    if (id === "conflict") buildConflict();
    if (id === "briefs")   buildBriefs();
  }
}

var _graphLoaded = false;

function loadGraph() {
  if (_graphLoaded) return;
  fetch('/api/demo/graph')
    .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(function(data) {
      _graphLoaded = true;
      var container = document.getElementById('graph-container');
      if (!container) return;
      var nodes = new vis.DataSet(data.nodes);
      var edges = new vis.DataSet(data.edges.map(function(e, i) { return Object.assign({}, e, {id: i}); }));
      var opts = {
        physics: {solver:'forceAtlas2Based', stabilization:{iterations:120}},
        edges: {smooth:{type:'curvedCW',roundness:0.2}, font:{size:9,color:'#475569',align:'middle'}},
        nodes: {borderWidth:1.5, margin:8},
        interaction: {hover:true, tooltipDelay:200},
      };
      new vis.Network(container, {nodes:nodes, edges:edges}, opts);
    })
    .catch(function() {
      var container = document.getElementById('graph-container');
      if (container) container.innerHTML = '<div class="placeholder" style="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center"><strong>🕸 Neo4j graph unavailable</strong>Run "▶ Run Demo" first to seed the graph</div>';
    });
}

        'MERID-US': 'brief-body-us',
      };
      var updated = 0;
      Object.keys(map).forEach(function(key) {
        if (!data[key]) return;
        var el = document.getElementById(map[key]);
        if (!el) return;
        el.innerHTML = '<div style="font-size:13px;color:var(--tx2);line-height:1.8">' + marked.parse(data[key]) + '</div>';
        updated++;
      });
      if (data.conflict) {
        var cf = document.getElementById('brief-body-us');
        if (cf) cf.insertAdjacentHTML('afterend',
          '<div class="bcard" style="margin-top:20px">' +
          '<div class="bh" style="background:linear-gradient(135deg,rgba(239,68,68,.08),transparent)">' +
          '<div class="bh-left"><div style="font-size:28px">⚠️</div><div><div style="font-size:15px;font-weight:800">Cross-Border Conflict Report</div></div></div></div>' +
          '<div class="bb"><div style="font-size:13px;color:var(--tx2);line-height:1.8">' + marked.parse(data.conflict) + '</div></div></div>');
      }
      if (status) status.textContent = '✓ ' + updated + ' briefs loaded from output/';
    })
    .catch(function(e) {
      if (status) status.textContent = '✗ ' + (e.message === '404' ? 'Run the pipeline first' : 'Server unavailable');
    });
}

var _pipelineRunning = false;
var _PIPELINE_STAGES = [
  {id:'ingestion', label:'Ingestion'},
  {id:'graph',     label:'Neo4j Graph'},
  {id:'engine',    label:'Tax Engine'},
  {id:'ai',        label:'AI Layer'},
  {id:'brief',     label:'Briefs'},
];

function _renderPipelineStrip(states) {
  var html = '<div class="sf" style="margin-bottom:0">';
  for (var i = 0; i < _PIPELINE_STAGES.length; i++) {
    var st = _PIPELINE_STAGES[i];
    var state = states[st.id] || 'todo';
    var nc = state === 'done' ? 'done' : state === 'running' ? 'wip' : 'todo';
    var cls = state === 'done' ? 's-done' : state === 'todo' ? 's-todo' : '';
    var num = state === 'done' ? '✓' : (i + 1);
    if (i > 0) html += '<div class="sf-conn"></div>';
    html += '<div class="sf-step ' + cls + '">' +
      '<div class="sf-num ' + nc + '">' + num + '</div>' +
      '<span class="sf-label">' + st.label + '</span>' +
      (state === 'running' ? '<span style="font-size:10px;color:var(--yel);margin-left:4px">…</span>' : '') +
    '</div>';
  }
  html += '</div>';
  document.getElementById('pipeline-strip').innerHTML = html;
}

function runPipeline() {
  if (_pipelineRunning) return;
  _pipelineRunning = true;
  var btn = document.getElementById('run-btn');
  var statusEl = document.getElementById('run-status');
  btn.disabled = true;
  btn.textContent = '⏳ Running…';

  var strip = document.getElementById('pipeline-strip');
  strip.style.display = 'block';
  var states = {ingestion:'running',graph:'todo',engine:'todo',ai:'todo',brief:'todo'};
  _renderPipelineStrip(states);

  fetch('/api/demo/run', {method:'POST'})
    .then(function(res) {
      var reader = res.body.getReader();
      var decoder = new TextDecoder();
      var buf = '';
      function pump() {
        return reader.read().then(function(chunk) {
          if (chunk.done) return;
          buf += decoder.decode(chunk.value, {stream:true});
          var parts = buf.split('\n\n');
          buf = parts.pop();
          parts.forEach(function(line) {
            if (!line.startsWith('data: ')) return;
            try {
              var evt = JSON.parse(line.slice(6));
              if (evt.stage && evt.status) {
                states[evt.stage] = evt.status === 'done' ? 'done' : evt.status === 'error' ? 'todo' : 'running';
                // advance next stage to running
                var idx = _PIPELINE_STAGES.findIndex(function(s) { return s.id === evt.stage; });
                if (evt.status === 'done' && idx + 1 < _PIPELINE_STAGES.length) {
                  states[_PIPELINE_STAGES[idx + 1].id] = 'running';
                }
                _renderPipelineStrip(states);
                if (statusEl) statusEl.textContent = evt.detail || '';
              }
            } catch(_) {}
          });
          return pump();
        });
      }
      return pump();
    })
    .then(function() {
      _pipelineRunning = false;
      btn.disabled = false;
      btn.textContent = '↺ Re-run';
      _graphLoaded = false;
      // Reload graph if data tab is visible
      if (document.getElementById('pg-data').classList.contains('on')) loadGraph();
    })
    .catch(function(e) {
      _pipelineRunning = false;
      btn.disabled = false;
      btn.textContent = '▶ Run Demo';
      if (statusEl) statusEl.textContent = 'Error: ' + e.message;
    });
}
</script>
